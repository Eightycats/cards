<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="theme-color" content="#ffffff" />
  <title>Card Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --accent: #f0f0f0;
      --accent-hover: #e0e0e0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1e1e1e;
        --text-color: #ffffff;
        --accent: #333333;
        --accent-hover: #444444;
      }
    }

    html, body {
      margin-top: 50px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 40px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
      padding: 0 20px;
    }

    .menu a {
      display: block;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 500;
      padding: 16px;
      border-radius: 12px;
      background-color: var(--accent);
      color: var(--text-color);
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
    }

    .menu a:hover {
      background-color: var(--accent-hover);
    }

    .menu a:active {
      transform: scale(0.97);
    }

    #install-btn {
      display: none;
      cursor: pointer;
      border: none;
      font-size: 1.2rem;
      font-weight: 500;
      padding: 16px;
      border-radius: 12px;
      background-color: var(--accent);
      color: var(--text-color);
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
      width: 100%;
    }

    #install-btn:hover { background-color: var(--accent-hover); }
    #install-btn:active { transform: scale(0.97); }

    #ios-hint {
      display: none;
      font-size: 0.9rem;
      text-align: center;
      color: var(--text-color);
      opacity: 0.6;
      padding: 8px 0 0;
    }
  </style>
</head>
<body>



  <h1>Card Trainer</h1>
  <div class="menu">
    <a href="how-it-works.html">What is this?</a>
    <a href="cards.html">Cards</a>
    <a href="study.html">Study</a>
    <a href="cards2pegs.html">Test: Cards ➝ Pegs</a>
    <a href="pegs2cards.html">Test: Pegs ➝ Cards</a>
    <button id="install-btn">Install App</button>
    <p id="ios-hint">To install: tap the Share button then "Add to Home Screen"</p>
  </div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then(() =>
      console.log("Service Worker Registered")
    );
  }

  // Hide install UI if already running as installed PWA
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone === true;

  if (!isStandalone) {
    let deferredPrompt;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById("install-btn").style.display = "block";
    });

    document.getElementById("install-btn").addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") {
        document.getElementById("install-btn").style.display = "none";
      }
      deferredPrompt = null;
    });

    // iOS Safari fallback (no beforeinstallprompt support)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS) {
      document.getElementById("ios-hint").style.display = "block";
    }
  }
</script>


</body>
</html>
