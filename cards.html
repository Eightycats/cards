<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Cards</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #f0f0f0;
      margin: 2rem;
    }

    .suit-buttons {
      margin-bottom: 20px;
      max-width: 500px;
    }

    .suit-buttons button {
      font-size: 20px;
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      border: 1px solid #333;
      border-radius: 6px;
      background-color: #f0f0f0;
    }

    .suit-buttons button.active {
      background-color: #d0d0ff;
    }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 500px;
    }

    .card-grid img {
      width: 100px;
      height: auto;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .card-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .card-label {
      font-size: 12px;
      text-align: center;
      max-width: 100px;
    }

    .hidden {
      display: none;
    }

    .top-left-nav {
      text-align: left;
      margin-bottom: 20px;
    }

    .top-left-nav a {
      text-decoration: none;
      font-size: 24px;
      padding: 4px 10px;
      border: 1px solid #000;
      border-radius: 6px;
      background-color: #f9f9f9;
      color: black;
    }
  </style>
</head>
<body>

  <div class="top-left-nav">
    <a href="index.html">🏠</a>
  </div>

  <div class="suit-buttons">
    <button onclick="showSuit('H')" id="btn-H">♥️</button>
    <button onclick="showSuit('S')" id="btn-S">♠️</button>
    <button onclick="showSuit('D')" id="btn-D">♦️</button>
    <button onclick="showSuit('C')" id="btn-C">♣️</button>
  </div>

  <div>
  <div id="cards-H" class="card-grid hidden"></div>
  <div id="cards-D" class="card-grid hidden"></div>
  <div id="cards-C" class="card-grid hidden"></div>
  <div id="cards-S" class="card-grid hidden"></div>
  </div>

  <script>
    const suits = ['H', 'D', 'C', 'S'];
    const ranks = ['A', '2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K'];

    const cards = {
      "H2": "HoNey", "H3": "HoMe", "H4": "HaiRy/HaRe", "H5": "HooF", "H6": "HoBo",
      "H7": "HaT", "H8": "HitCH", "H9": "HoG", "HT": "HorSe", "HJ": "Cupid", "HQ": "Bride", "HK": "Groom", "HA": "Heart",
      "D2": "DoN", "D3": "DoM", "D4": "DooR", "D5": "DoVe", "D6": "DoPey", "D7": "DoT", "D8": "DiSH", "D9": "DoG", "DT": "DiZZy",
      "DJ": "Ninja", "DQ": "The Queen", "DK": "Miner", "DA": "Diamond",
      "C2": "CaN", "C3": "CoMb", "C4": "CoRe CaR", "C5": "CoFFee CaVe", "C6": "CoB", "C7": "CaT", "C8": "CaSH", "C9": "CoG",
      "CT": "KiSS", "CJ": "Travolta", "CQ": "Sea Hag", "CK": "Elvis", "CA": "Giant Club",
      "S2": "SuN", "S3": "SaM", "S4": "SoRe SiR", "S5": "SaFe", "S6": "SoaP", "S7": "SooTy SeaT", "S8": "SaSH", "S9": "CiGarette",
      "ST": "SiSter", "SJ": "Boy with Spade", "SQ": "Maid", "SK": "Farmer", "SA": "Death"
    };

    function loadCards() {
      for (const suit of suits) {
        const container = document.getElementById(`cards-${suit}`);
        for (const rank of ranks) {
          const code = `${suit}${rank}`;
          const item = document.createElement('div');
          item.className = 'card-item';
          const img = document.createElement('img');
          img.src = `img/${code}.png`;
          img.alt = code;
          const label = document.createElement('div');
          label.className = 'card-label';
          label.textContent = cards[code] || '';
          item.appendChild(img);
          item.appendChild(label);
          container.appendChild(item);
        }
      }
    }

    function showSuit(suitToShow) {
      for (const suit of suits) {
        document.getElementById(`cards-${suit}`).classList.add('hidden');
        document.getElementById(`btn-${suit}`).classList.remove('active');
      }
      document.getElementById(`cards-${suitToShow}`).classList.remove('hidden');
      document.getElementById(`btn-${suitToShow}`).classList.add('active');
    }

    // Init
    loadCards();
    showSuit('H'); // Show Hearts by default
  </script>

</body>
</html>
